# ============================================================================
#  Конфигурация скрипта межбиржевого фьючерсного арбитража
#  Все секреты (API-ключи) — в .env, здесь только имена переменных.
#  Значения комиссий/плеча/минимумов сверяйте с биржами на момент запуска.
#  Комментарий к каждому параметру — над ним.
# ============================================================================

# --- Режим запуска -------------------------------------------------------

# true = реальные ордера НЕ отправляются, исполнение симулируется (paper),
# логируются сигналы и расчётный P&L. false = боевой режим (реальные деньги).
dry_run: true

# true = использовать testnet бирж, где поддерживается.
testnet: false

# --- WebSocket-стриминг котировок ----------------------------------------
ws:
  # Способ стрима котировок:
  # auto  — watch_bids_asks (лучший bid/ask пачкой) -> tickers -> стакан;
  # bids_asks | tickers | order_book — принудительно.
  # Батчевый BBO кратно снижает число подписок и убирает ошибки checksum
  # стакана и лимит "request too many".
  method: auto

  # Сколько пар в одном батч-стриме (для режима стакана — размер чанка подписки).
  symbols_per_stream: 100

  # Пауза (сек) между стартами чанков подписок (анти "request too many").
  subscribe_delay: 0.3

  # Сек прогрева перед первым сканом (дать стримам наполнить кэш).
  warmup: 8

  # Сек между обновлениями funding по всем парам (меняется медленно).
  funding_interval: 300

  # Сек между строками диагностики (покрытие котировками + топ спреды с причиной).
  stats_interval: 20

# --- Биржи ---------------------------------------------------------------
# Ключи — в .env под указанными именами. taker_fee — доля (0.0005 = 0.05%),
# ОБЯЗАТЕЛЬНО выставить реальные значения: от них зависит расчёт прибыли.
exchanges:
  binance:
    # Включить биржу в работу.
    enabled: true
    # Имя переменной .env с API-ключом.
    api_key_env: BINANCE_API_KEY
    # Имя переменной .env с API-секретом.
    api_secret_env: BINANCE_API_SECRET
    # Тейкерская комиссия фьючерсов (доля). ПРОВЕРИТЬ по своему VIP-уровню.
    taker_fee: 0.0005
    # Тип рынка: swap = линейные бессрочные перпы (USDT-M).
    default_type: swap
  bybit:
    enabled: true
    api_key_env: BYBIT_API_KEY
    api_secret_env: BYBIT_API_SECRET
    # 0.055% — ПРОВЕРИТЬ.
    taker_fee: 0.00055
    default_type: swap
  okx:
    enabled: true
    api_key_env: OKX_API_KEY
    api_secret_env: OKX_API_SECRET
    # OKX требует passphrase — имя переменной .env с ней.
    api_password_env: OKX_API_PASSWORD
    # ПРОВЕРИТЬ.
    taker_fee: 0.0005
    default_type: swap
  mexc:
    enabled: true
    api_key_env: MEXC_API_KEY
    api_secret_env: MEXC_API_SECRET
    # 0.04% — ПРОВЕРИТЬ (фьючерсы MEXC).
    taker_fee: 0.0004
    default_type: swap
  bitget:
    enabled: true
    api_key_env: BITGET_API_KEY
    api_secret_env: BITGET_API_SECRET
    # Bitget требует passphrase — имя переменной .env с ней.
    api_password_env: BITGET_API_PASSWORD
    # ПРОВЕРИТЬ.
    taker_fee: 0.0006
    default_type: swap
  gate:
    enabled: true
    api_key_env: GATE_API_KEY
    api_secret_env: GATE_API_SECRET
    # 0.05% — ПРОВЕРИТЬ (фьючерсы Gate).
    taker_fee: 0.0005
    default_type: swap

# --- Комиссии ------------------------------------------------------------
fees:
  # Тянуть актуальные taker-комиссии с бирж на старте (fetch_trading_fees,
  # учитывает VIP-уровень аккаунта). При неудаче — берётся taker_fee из секции
  # exchanges. false = всегда использовать значения из конфига.
  fetch_from_exchange: true

# --- Пороги спреда и выхода (§6, §7) -------------------------------------
spread:
  # БАЗОВЫЙ критерий входа «сейчас разошлось»: порог сырого спреда
  # (bid_H - ask_L)/ask_L. Вход только когда пара разошлась на >= этого значения.
  min_gross_spread: 0.013

  # Верхняя граница сырого спреда: выше почти всегда ошибка данных
  # (протухшая котировка / пустой стакан / разные единицы), не сигнал.
  max_gross_spread: 0.05

  # Порог чистой прибыли после всех издержек (комиссии/слиппедж/funding).
  min_net_spread: 0.002

  # Целевое схождение спреда для закрытия позиции (около 0%). Закрытие по target
  # срабатывает, ТОЛЬКО если позиция при этом не в убытке (иначе держим).
  exit_spread: 0.0

  # Фиксация прибыли: закрыть, когда нереализованный P&L достиг доли нотионала
  # (0.005 = 0.5%). Симметрично со stop_loss для 1:1 риск/ревард.
  # null = выкл.
  take_profit_pct: 0.005

  # Фиксация убытка (стоп): закрыть, когда убыток достиг доли нотионала
  # (0.005 = 0.5%). Симметрично с take_profit.
  # null = выкл.
  stop_loss_pct: 0.005

  # Сек: сколько спред должен держаться >= порога, прежде чем войти
  # (отсекает мгновенные флэш-прострелы).
  min_spread_persistence: 3

  # Мс: котировка старше — считается протухшей и пропускается.
  max_quote_age_ms: 5000

  # Охота за флэш-прострелами (§6). На старте выключено.
  hunt_flash: false

# --- Историческая сверка тождественности (§4, §5) ------------------------
# Базовый критерий: берём пару, только если за `days` дней на дневных свечах
# её min/max на биржах расходятся <= max_divergence («исторически шли вместе»).
history:
  # Включить историческую сверку.
  enabled: true

  # ДО поиска арбитража отобрать пары, что исторически шли вместе.
  # true  — анализ свечей один раз на старте (prequalify), в работе остаются
  #         только пары с расхождением <= max_divergence; на входе свечи не тянем.
  # false — ленивая сверка в момент каждого сигнала.
  prefilter: true

  # Сколько одновременных запросов свечей при предфильтре.
  prefilter_concurrency: 20

  # true — сверка ОБЯЗАТЕЛЬНА для всех входов (без истории/данных не входим).
  require_divergence: true

  # >= этого текущего сырого спреда считается «сейчас разошлось».
  check_spread: 0.013

  # Таймфрейм свечей для сверки.
  timeframe: 1d

  # За сколько последних дней брать min/max.
  days: 10

  # Макс. расхождение исторических уровней между биржами (0.003 = 0.3%).
  max_divergence: 0.003

  # Сколько верхних сигналов (по net) проверять историей за один проход (ленивый режим).
  max_candidates_check: 10

# --- Доп-фильтры сигнала (вкл/выкл, чтобы упрощать вход) ------------------
# Базовые критерии действуют ВСЕГДА: (1) история <= max_divergence и
# (2) сейчас разошлись >= min_gross_spread. Ниже — «тяжёлые» проверки,
# которые можно отключить, если сигналов слишком мало.
filters:
  # Чистый спред >= min_net_spread (после комиссий/слиппеджа/funding).
  net_spread: true

  # Наш объём пролезает по верхушке стакана (проверяется и вход, и выход).
  top_depth: true

  # Спред держится >= min_spread_persistence.
  persistence: true

  # Верхняя граница сырого спреда (защита от битых данных).
  max_gross_spread: true

  # Отсекать устаревшие котировки (по max_quote_age_ms).
  quote_age: true

# --- Объём и плечо (§8) ---------------------------------------------------
sizing:
  # Режим размера позиции:
  #   notional — фиксированный нотионал (position_size/notional_target);
  #   min      — минимально возможный объём, удовлетворяющий минимумам ОБЕИХ бирж
  #              (нужна крошечная маржа; вход почти всегда пролезает по балансу).
  mode: notional

  # Целевой нотионал ОДНОЙ ноги в USDT. Задаёт объём: объём = notional/цена,
  # округлённый под шаг лота. От него зависят и проверка исполнимости, и
  # цена входа (глубже идём по стакану — хуже средняя цена), и P&L.
  notional_target: 2000

  # Явный нотионал одной ноги (USDT). Если задан — используется ВМЕСТО
  # notional_target. null = использовать notional_target.
  position_size: null

  # Желаемое плечо; фактическое = min(leverage, макс. плечо биржи).
  leverage: 20

  # Режим маржи: isolated | cross.
  margin_mode: cross

  # Допустимый слиппедж на ногу (0.001 = 0.1%). Используется как порог фильтра
  # и как слагаемое в ОЦЕНКЕ чистого спреда. В фактический P&L не входит —
  # там слиппедж считается по реальному стакану (см. execution.simulate_slippage).
  max_slippage: 0.001

# --- Исполнение (§7) ------------------------------------------------------
execution:
  # Тип ордера на вход: market | limit (post-only для тонких стаканов).
  order_type: market

  # Если одна нога не исполнилась: rollback (закрыть вторую) | retry (довыставить).
  on_leg_failure: rollback

  # Сек ожидания исполнения ноги.
  leg_timeout: 5

  # dry_run: исполнять по реальному стакану (VWAP) — учитывать слиппедж и
  # частичное исполнение, чтобы P&L был ближе к реальному. false = по верхушке.
  simulate_slippage: true

  # Глубина стакана (уровней) для оценки исполнения.
  orderbook_limit: 50

# --- Управление рисками (§9) ---------------------------------------------
risk:
  # Максимум одновременно открытых арбитражных пар. 0 = без лимита (берём по
  # максимуму, пока хватает баланса).
  max_concurrent_positions: 1

  # Пункт 6: закрывать убыточные пары за счёт накопленной прибыли. Если по паре
  # нереализованный убыток, а сессионный P&L его перекрывает — закрыть её сейчас.
  profit_buffer_close: true
  # Минимальный сессионный net, ниже которого неттинг не опускается (USDT).
  profit_buffer_keep: 0.0

  # Максимум залога на одной бирже (USDT). Бюджет 100 на каждой.
  max_position_per_exchange: 100

  # Сек: принудительное закрытие позиции по времени удержания.
  max_hold_time: 3600

  # Спред разошёлся сверх этого лимита -> контролируемое закрытие (0.02 = 2%).
  max_adverse_spread: 0.02

  # Минимальный запас до цены ликвидации (0.03 = 3%).
  liquidation_buffer: 0.03

  # Сек паузы по паре после закрытия (чтобы не дёргать один сигнал).
  cooldown: 300

  # Сек между фоновыми обновлениями баланса (чтобы вход не ждал fetch_balance).
  balance_refresh: 30

  # Один вход на пару за сессию (без повторных заходов в ту же пару).
  one_shot_per_pair: true

  # На старте автоматически закрывать «орфанов» — незахеджированные одиночные
  # ноги (только в боевом режиме). false = только предупреждать в логе/Telegram.
  close_orphans_on_start: false

# --- Локальное хранилище позиций (аудит/восстановление) ------------------
state:
  # Вести локальный JSON-файл открытых позиций (аудит; для аварийного закрытия
  # не обязателен — там позиции читаются прямо с бирж).
  enabled: true
  # Путь к файлу.
  positions_file: data/positions.json

  # Писать все сделки и ордера в SQLite для анализа (python -m arb.main --analyze).
  db_enabled: true
  # Путь к базе.
  db_file: data/trades.db

# --- Вселенная / защита от коллизий (§4) ---------------------------------
universe:
  # Пропускать пары, у которых делистинг/поставка в пределах N дней.
  skip_delisting_days: 3

  # Во сколько раз может отличаться contractSize между биржами, прежде чем
  # пара считается коллизией. null = проверка ВЫКЛючена (рекомендуется):
  # contractSize — множитель контракта, законно отличается на порядки
  # (MEXC=0.0001, Binance=1) и НЕ влияет на цену. Коллизии (разные токены под
  # одним тикером) отсекаются max_gross_spread + deny_list.
  max_contract_size_ratio: null

# --- Списки тикеров (§4) -------------------------------------------------

# Если непусто — отслеживать ТОЛЬКО эти нормализованные тикеры (напр. BTC/USDT).
allow_list: []

# Исключить спорные/коллизионные тикеры (первый элемент — заглушка).
deny_list:
  - ""

# --- Логирование (§10) ---------------------------------------------------
logging:
  # Технический лог (запуск, подключения, ошибки, отклонённые сигналы).
  app_log: logs/app.log

  # Машиночитаемый лог сделок: одна сделка = одна запись (jsonl | csv).
  trades_log: logs/trades.jsonl

  # Уровень логирования.
  level: INFO

# --- Уведомления в Telegram ----------------------------------------------
telegram:
  # Включить пуш-уведомления (старт / вход / закрытие).
  enabled: true

  # Имена переменных .env с токеном и chat_id (сами значения — в .env).
  token_env: TELEGRAM_BOT_TOKEN
  chat_id_env: TELEGRAM_CHAT_ID

  # Метка в каждом сообщении — отличать от статистики других ботов в чате.
  app_name: "Арбитраж-бот"

  # Пункт 9: в боевом режиме (dry_run=false) слать в Telegram старт, пуши по
  # открытию/закрытию позиций и критичные алерты о нехватке баланса (эти категории
  # шлются всегда). Аномалии и диагностику — не шлём. В dry_run шлём всё.
  # false = слать все категории и в боевом режиме.
  live_only_trades: true
