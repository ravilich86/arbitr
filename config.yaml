# ============================================================================
#  Конфигурация арбитражного бота (межбиржевой арбитраж USDT-перпов)
#
#  КАК РАБОТАЕТ (коротко):
#   1) отбираем пары, которые за последние 10 дней ходили почти одинаково (≤0.3%);
#   2) ждём, когда такая пара «разъедется» ≥1.3% между двумя биржами;
#   3) шортим на дорогой бирже + лонгуем на дешёвой (обе ноги = ОДНА позиция);
#   4) держим, пока спред не сойдётся обратно -> закрываем в плюс.
#
#  ГЛАВНЫЕ РУЧКИ (что обычно крутят):
#   dry_run                       — боевой режим или тест
#   spread.min_gross_spread       — при каком расхождении входить (1.3%)
#   spread.take_profit_pct        — при какой прибыли фиксировать
#   risk.max_adverse_spread       — при каком РАСХОЖДЕНИИ спреда закрыть в минус
#   risk.max_concurrent_positions — сколько пар держать одновременно
#   sizing.mode / leverage        — размер позиции и плечо
#  Остальное можно не трогать.
#
#  Секреты (API-ключи, токены) — в .env, здесь только имена переменных.
# ============================================================================

# --- Режим -----------------------------------------------------------------

# false = боевой режим (реальные деньги). true = тест: ордера не отправляются,
# всё считается «на бумаге» (paper trading).
dry_run: false

# Тестовые сети бирж (обычно false).
testnet: false

# --- Вход и выход (главное) -------------------------------------------------
spread:
  # ВХОД. Минимальное расхождение цены между биржами, при котором входим.
  # 0.013 = 1.3%. Ниже — не заходим.
  min_gross_spread: 0.013

  # Защита от мусора: расхождение выше этого — почти всегда битые данные
  # (зависшая котировка), не сигнал. 0.05 = 5%.
  max_gross_spread: 0.05

  # ФИКСАЦИЯ ПРИБЫЛИ. Закрыть пару, когда её общий P&L достиг этой доли объёма.
  # 0.005 = 0.5%. null = не фиксировать по прибыли (ждать полного схождения).
  take_profit_pct: 0.005

  # СТОП по P&L. Для захеджированной пары обычно НЕ нужен (риск ловим по спреду —
  # см. risk.max_adverse_spread). null = выключен. Число (0.01 = 1%) = включить.
  stop_loss_pct: null

  # Цель схождения спреда для закрытия в плюс (0 ≈ полностью сошёлся).
  exit_spread: 0.0

  # Минимальная чистая прибыль после всех издержек (для фильтра net_spread).
  min_net_spread: 0.002

  # Сколько секунд расхождение должно продержаться, прежде чем войти
  # (отсекает мгновенные «прострелы»). Работает, если включён filters.persistence.
  min_spread_persistence: 3

  # Котировка старше этого (мс) считается устаревшей и игнорируется.
  max_quote_age_ms: 5000

# --- Проверка «пара исторически ходила вместе» ------------------------------
history:
  # Включить проверку (рекомендуется true).
  enabled: true

  # Проверять один раз на старте (true, быстрее) или в момент каждого сигнала (false).
  prefilter: true

  # Обязательна для всех входов: без подтверждения истории не входим.
  require_divergence: true

  # За сколько последних дней смотрим и на каком таймфрейме.
  days: 10
  timeframe: 1d

  # Насколько близко пара должна была ходить, чтобы считать её «одним активом».
  # 0.003 = 0.3%.
  max_divergence: 0.003

  # Сколько одновременных запросов свечей на старте (нагрузка на биржи).
  prefilter_concurrency: 20

  # Сколько верхних сигналов проверять историей за проход (для режима prefilter=false).
  max_candidates_check: 10

# --- Управление рисками -----------------------------------------------------
risk:
  # Сколько пар держать одновременно. 0 = без ограничения.
  max_concurrent_positions: 10

  # ГЛАВНЫЙ СТОП. Если спред разошёлся ПРОТИВ нас сверх этого — закрываем в минус.
  # 0.02 = 2%. Это основной ограничитель риска для захеджированной пары.
  max_adverse_spread: 0.02

  # Принудительно закрыть позицию, если висит дольше (сек). 3600 = 1 час.
  max_hold_time: 3600

  # Максимум залога на одной бирже (USDT). Ограничивает суммарный объём.
  max_position_per_exchange: 100

  # Пауза по паре после закрытия/неудачи (сек), чтобы не заходить в неё сразу снова.
  cooldown: 300

  # Один вход в пару за сессию (не заходить в ту же пару повторно).
  one_shot_per_pair: true

  # Закрывать убыточную пару за счёт накопленной прибыли (сессионный P&L перекрывает).
  profit_buffer_close: true
  # Не опускать сессионный net ниже этого при таком закрытии (USDT).
  profit_buffer_keep: 0.0

  # На старте автоматически закрывать «орфанов» — одиночные ноги без пары (риск!).
  close_orphans_on_start: true

  # Запас до цены ликвидации (для isolated-маржи; при cross не применяется).
  liquidation_buffer: 0.03

  # Как часто обновлять баланс в фоне (сек), чтобы вход не ждал запрос баланса.
  balance_refresh: 30

# --- Размер позиции и плечо -------------------------------------------------
sizing:
  # Размер: min = минимальный объём под лимиты обеих бирж (нужна крошечная маржа);
  #         notional = фиксированный объём в USDT (см. notional_target).
  mode: min

  # Объём одной ноги в USDT (для mode: notional).
  notional_target: 2000

  # Плечо. Фактическое = min(это, максимум биржи); при отказе биржи подбирается вниз.
  leverage: 20

  # Режим маржи: cross (общий залог, рекомендуется) или isolated.
  margin_mode: cross

  # Ожидаемое проскальзывание на ногу (0.001 = 0.1%). Закладывается в оценку прибыли.
  max_slippage: 0.001

# --- Фильтры сигнала (вкл/выкл) ---------------------------------------------
# База (история ≤0.3% + расхождение ≥1.3%) работает всегда. Ниже — доп-проверки.
filters:
  # Прибыль остаётся после всех издержек (комиссии/слиппедж/funding).
  net_spread: true
  # Наш объём реально пролезает по стакану на входе И выходе.
  top_depth: true
  # Спред держится min_spread_persistence секунд (не мгновенный прострел).
  persistence: true
  # Отсекать аномально большой спред (битые данные).
  max_gross_spread: true
  # Отсекать устаревшие котировки.
  quote_age: true

# --- Биржи ------------------------------------------------------------------
# taker_fee — комиссия фьючерсов (доля). Если fees.fetch_from_exchange: true,
# реальная ставка подтягивается с биржи, а это значение — запасное.
exchanges:
  binance:
    enabled: true
    api_key_env: BINANCE_API_KEY
    api_secret_env: BINANCE_API_SECRET
    taker_fee: 0.0005
    default_type: swap
  bybit:
    enabled: true
    api_key_env: BYBIT_API_KEY
    api_secret_env: BYBIT_API_SECRET
    taker_fee: 0.00055
    default_type: swap
  okx:
    enabled: true
    api_key_env: OKX_API_KEY
    api_secret_env: OKX_API_SECRET
    api_password_env: OKX_API_PASSWORD   # OKX требует passphrase
    taker_fee: 0.0005
    default_type: swap
  mexc:
    enabled: true
    api_key_env: MEXC_API_KEY
    api_secret_env: MEXC_API_SECRET
    taker_fee: 0.0004
    default_type: swap
  bitget:
    enabled: true
    api_key_env: BITGET_API_KEY
    api_secret_env: BITGET_API_SECRET
    api_password_env: BITGET_API_PASSWORD  # Bitget требует passphrase
    taker_fee: 0.0006
    default_type: swap
  gate:
    enabled: true
    api_key_env: GATE_API_KEY
    api_secret_env: GATE_API_SECRET
    taker_fee: 0.0005
    default_type: swap

fees:
  # Подтягивать реальные комиссии с бирж на старте (с учётом VIP-уровня).
  fetch_from_exchange: true

# --- Уведомления в Telegram -------------------------------------------------
telegram:
  enabled: true
  token_env: TELEGRAM_BOT_TOKEN
  chat_id_env: TELEGRAM_CHAT_ID
  # Метка в каждом сообщении (отличать от других ботов в чате).
  app_name: "Арбитраж-бот"
  # В боевом режиме слать только: старт, вход, закрытие, нехватка баланса.
  # false = слать вообще всё (включая диагностику).
  live_only_trades: true

# ============================================================================
#  ПРОДВИНУТОЕ — обычно менять не нужно
# ============================================================================

# --- Исполнение ордеров -----------------------------------------------------
execution:
  order_type: market        # market | limit
  on_leg_failure: rollback  # если одна нога не встала: rollback | retry
  leg_timeout: 5            # сек ожидания исполнения ноги
  simulate_slippage: true   # в тесте считать исполнение по реальному стакану
  orderbook_limit: 50       # глубина стакана для оценки

# --- WebSocket-стриминг котировок -------------------------------------------
ws:
  method: auto             # auto | bids_asks | tickers | order_book
  symbols_per_stream: 100  # размер чанка подписки (для режима order_book)
  subscribe_delay: 0.3     # пауза между подписками (анти "request too many")
  warmup: 8                # сек прогрева перед первым сканом
  funding_interval: 300    # сек между обновлениями funding
  stats_interval: 20       # сек между строками диагностики

# --- Вселенная пар ----------------------------------------------------------
universe:
  # Пропускать пары с делистингом в пределах N дней.
  skip_delisting_days: 3
  # Порог расхождения contractSize для коллизий; null = проверка выключена.
  max_contract_size_ratio: null

# Отслеживать ТОЛЬКО эти тикеры (если непусто), напр. [BTC/USDT, ETH/USDT].
allow_list: []
# Исключить эти тикеры.
deny_list:
  - ""

# --- Хранилище и логи -------------------------------------------------------
state:
  enabled: true                       # локальный журнал позиций (аудит)
  positions_file: data/positions.json
  db_enabled: true                    # SQLite для анализа (--analyze / --sync-fills)
  db_file: data/trades.db

logging:
  app_log: logs/app.log           # технический лог
  trades_log: logs/trades.jsonl   # лог сделок (--history)
  level: INFO
